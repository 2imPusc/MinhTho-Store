# /etc/nginx/sites-available/minhtho
# Đổi server_name thành domain thật. Certbot sẽ tự thêm block HTTPS.

server {
    listen 80;
    listen [::]:80;
    server_name store.example.com;

    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/minhtho.access.log;
    error_log  /var/log/nginx/minhtho.error.log;

    # Proxy toàn bộ sang Node (Node tự serve FE static qua SERVE_CLIENT=true)
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Cache asset FE dài hạn (Vite hash filename)
    location ~* \.(?:js|css|woff2|png|jpg|jpeg|svg|webp|ico)$ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Service worker: không cache để update nhanh
    location = /sw.js {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
